<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        .ctrl{position:fixed;top:20px;right:20px;background:#222;padding:8px;color:#fff;border-radius:6px}
        .sub{position:fixed;right:20px;bottom:30px;background:#0009;color:#fff;padding:10px 16px;font-size:22px;max-width:550px;border-radius:8px}
    </style>
</head>
<body>
<div class="ctrl">
    <select id="lang">
        <option value="en">英语(美剧)</option>
        <option value="jp">日语</option>
    </select>
</div>
<div class="sub" id="sub">正在连接...</div>

<script>
    let ws;
    let sel = document.getElementById("lang");
    let subDom = document.getElementById("sub");
    const wsUrl = `ws://localhost:8080/trans/ws`;

    // 初始化连接
    function initWs() {
        ws = new WebSocket(wsUrl);

        ws.onopen = function() {
            subDom.innerText = "连接成功";
            // 连接成功立即发送默认选中语言
            ws.send(sel.value);
        };

        ws.onmessage = function(e) {
            subDom.innerText = e.data;
        };

        ws.onclose = function() {
            subDom.innerText = "连接断开，正在重连...";
            // 3秒后自动重连
            setTimeout(initWs, 3000);
        };

        ws.onerror = function() {
            subDom.innerText = "连接出错";
        };
    }

    // 下拉切换发送语言
    sel.onchange = () => {
        if(ws && ws.readyState === WebSocket.OPEN){
            ws.send(sel.value);
        }
    };

    // 启动连接
    initWs();
</script>
</body>
</html>
